<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>

<body>
    <h1>Student List</h1>
    <!-- lalagyan ng buong table -->
    <table>
        <!-- Table Header -->
        <thead>
            <!-- table row -->
            <tr>
                <!-- table header cell -->
                <!-- Usually Bold -->
                <th>Name</th>
                <th>Course</th>
            </tr>
        </thead>
        <!-- actual data -->
        <tbody>
            <tr>
                <!-- table data cell -->
                <td>Ace</td>
                <td>BSIT</td>
            </tr>

            <tr>
                <td>Juan</td>
                <td>BSCS</td>
            </tr>

            <tr>
                <td>Maria</td>
                <td>BSIS</td>
            </tr>
        </tbody>

    </table>
</body>

</html>
