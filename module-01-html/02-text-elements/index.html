<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Elements</title>
</head>

<body>
    <!-- Headings -->
    <h1>Biggest</h1>
    <h2>Smaller</h2>
    <h3>Smaller</h3>
    <h4>Smaller</h4>
    <h5>Smaller</h5>
    <h6>Smallest</h6>

    <!-- Paragraph -->
    <!-- Block element -->
    <!-- Automatic new line -->
    <p>Hello World</p>

    <!-- Span -->
    <!-- Inline text -->
    <p>
        Hello <span>Ace</span>
    </p>

    <!-- Line break -->
    <p>
        Hello
        <br>
        World
    </p>

    <!-- Horizontal line -->
    <hr>

    <!-- Important/Bold text -->
    <!-- this is inline -->
    <strong>Important</strong>

    <!-- Emphasized/Italic-->
    <!-- this is inline -->
    <em>Italic</em>

    <!-- Exercise -->
    <h1>Frontend Grind</h1>

    <h2>About Me</h2>

    <p>Graduating 4th Year BSIT Student</p>
    <p>Learning Frontend Development</p>

    <hr>

    <h2>Favorite Technologies</h2>
    <p>HTML</p>
    <p>CSS</p>
    <p>JavaScript</p>

</body>

</html>
