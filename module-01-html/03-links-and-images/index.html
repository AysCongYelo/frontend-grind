<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links and Images</title>
</head>

<body>
    <!-- Links -->
    <!-- a = anchor tag -->
    <!-- href = destination  -->
    <!-- Google = clickable text -->
    <!-- _blank = new tab -->
    <a href="https://google.com" target="_blank">Google</a>

    <!-- Images -->
    <!-- src = location ng image -->
    <!-- alt = description kapag di nagload image -->

    <!-- Local Image -->
    <img src="assets/cat.jpg" alt="cute white cat with blue and green eye color">
    <img src="assets/dog.avif" alt="cute golden retriever">

    <!-- Online Image -->
    <img src="https://auburndalevets.com/wp-content/uploads/bb-plugin/cache/Dog-and-cat_blog-photo-circle-4eb2a829a5755835a34fe2a4657ef61c-62d96c010c5d0.jpg"
        alt="a cat and a dog laying with each other">

    <!-- Exercise -->
    <h1>My Favorite Websites</h1>

    <a href="https://www.google.com" target="_blank">Google</a>
    <a href="https://github.com" target="_blank">GitHub</a>

    <hr>

    <h2>My Favorite Image</h2>
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSln0KkqAhz067k9OgagA8UzrIzTbDg316BRg&s"
        alt="beautiful Giselle with red background">
</body>

</html>
