<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>

<body>
    <!-- form container -->
    <form>
        <!-- text input -->
        <!-- placeholder makikita sa loob ng textbox -->
        <input type="text" placeholder="Enter your name">

        <!-- email input -->
        <!-- dapat may @ -->
        <input type="email">

        <!-- password input -->
        <!-- nakamask yung characters -->
        <input type="password">

        <!-- button -->
        <button>
            Submit
        </button>
        <!-- Exercise 1 -->
    </form>
    <h1>Login Form</h1>
    <form>
        <input type="text" placeholder="Enter yor username...">
        <br><br>
        <input type="password" placeholder="Enter your password...">
        <br><br>
        <button>Login</button>
    </form>

    <form> <!-- textarea -->
        <!-- kapag mahaba input -->
        <textarea rows="4" placeholder="Enter your message"></textarea>

        <!-- select -->
        <!-- dropdown menu -->
        <select>
            <!-- choices -->
            <option>Philippines</option>
            <option>Japan</option>
            <option>Korea</option>
        </select>
    </form>

    <!-- Exercise 2 -->
    <h1>Contact Form</h1>
    <form>
        <input type="text" placeholder="Enter your name">
        <br><br>
        <textarea placeholder="Enter your message"></textarea>
        <h2>Choose a country</h2>
        <select>
            <option>Philippines</option>
            <option>Japan</option>
            <option>Korea</option>
        </select>
        <br><br>
        <button>Send</button>
    </form>

    <form>
        <!-- radio isa lang pwedeng piliin -->
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female

        <!-- checkbox kapag maraming pwedeng piliin -->
        <input type="checkbox"> Coding
        <input type="checkbox"> Gaming
        <input type="checkbox"> Watching Anime
    </form>

    <!-- Exercise 3 -->
    <h1>Registration Form</h1>
    <form>
        <input type="text" placeholder="Enter your name">
        <br><br>
        <input type="email" placeholder="Enter your email">
        <br><br>
        <input type="password" placeholder="Enter your password">
        <h2>Gender</h2>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female

        <h2>Hobbies</h2>
        <input type="checkbox"> Coding
        <input type="checkbox"> Gaming
        <input type="checkbox"> Watching Anime

        <h2>Country</h2>
        <select>
            <option>Philippines</option>
            <option>Japan</option>
            <option>Korea</option>
        </select>
        <br><br>
        <textarea rows="4" placeholder="Enter your message"></textarea>
        <br><br>
        <button>Register</button>
    </form>
</body>

</html>
